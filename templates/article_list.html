<!-- templates/article_list.html -->

{% extends "base.html" %}

{% block title %} Non-Stop Horrors {% endblock title %}

{% block content %}
{% for article in article_list %}
<div class="card" style="width: 70%; margin: 0 auto;">
    <div class="card-header">
        <span class="fw-bold">
            <a href="{{ article.get_absolute_url }}">{{ article.title }}</a>
        </span>
        <span class="text-muted">by: {{ article.author }} | {{ article.date}} </span>
    </div>
    <div class="card-body">
        {{ article.body }}
    </div>
    <div class="card-footer text-center text-muted">
        <a href="{% url 'article_edit' article.pk %}">Change the Future</a> | 
        <a href="{% url 'article_delete' article.pk %}">Delete the Past</a>
    </div>
</div>
<br />

{% endfor %}
{% endblock content %}
