<!-- templates/registration/password_reset_confirm.html -->

{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %} Enter a new password {% endblock title %}

{% block content %}
<h1>Cast off regrets, and choose a new password</h1>

<form method="POST" style="margin: 40px 0; padding: 30px;">
    {% csrf_token %}
    {{ form|crispy }}
    <input class="btn btn-success" type="submit" value="Change my password" />
</form>
{% endblock content %}
