<!-- templates/registration/signup.html -->
 
{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %} Sign Up for You Can't Choose {% endblock title %}

{% block content %}
    <h2 style="margin-bottom: 5px; padding: 20px;">Sign Up </h2>
    <form method="post" style="margin: 40px 0; padding: 30px;">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-success" type="submit">Sign Up</button>
    </form>

{% endblock content %}
